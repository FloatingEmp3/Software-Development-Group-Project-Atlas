<!DOCTYPE html>
<html>
<head>
    <title>Sky Portal</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f4f6f9;
        }

        .sidebar {
            height: 100vh;
            background-color: #1e293b;
            color: white;
            position: sticky;
            top: 0;
            overflow-y: auto;
        }

            .sidebar a {
                display: block;
                padding: 10px;
                color: white;
                text-decoration: none;
            }

                .sidebar a:hover {
                    background-color: #334155;
                }
    </style>
</head>

<body>

    <div class="container-fluid">
        <div class="row">

            <div class="col-2 sidebar d-flex flex-column" style="height: 100vh">
                <h4 class="text-center mt-3">Portal</h4>
                <a href="/">Home</a>
                <a href="/teams/">Teams</a>
                <a href="/organization/">Organization</a>
                <a href="/messaging/inbox/">Messages</a>
                <a href="/schedule/">Schedule</a>
                <a href="/reports/">Reports</a>
                
                <div class="mt-auto">
                    <form method="post" action="/logout/">
                        {% csrf_token %}
                        <button type="submit" style="background:none; border:none; color:white; padding:10px; cursor:pointer; display:block; width:100%;">Logout</button>
                    </form>
                </div>
            </div>

            <div class="col-10 p-4">
                {% block content %}
                {% endblock %}
            </div>

        </div>
    </div>

</body>
</html>
