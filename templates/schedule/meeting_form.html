{% extends 'base.html' %}
{% block content %}
<div class="card p-4 bg-white" style="max-width: 600px;">
    <h2 class="mb-4">Schedule a Meeting</h2>
    <form method="post">
        {% csrf_token %}
        {% for field in form %}
        <div class="mb-3">
            <label class="form-label fw-bold">{{ field.label }}</label>
            {{ field }}
            {% if field.errors %}
            <div class="text-danger small">{{ field.errors }}</div>
            {% endif %}
        </div>
        {% endfor %}
        <button type="submit" class="btn btn-primary">Save Meeting</button>
        <a href="/schedule/" class="btn btn-secondary ms-2">Cancel</a>
    </form>
</div>
{% endblock %}
